    #-----------------------------------------------------------------------------
    # PostgreSQL Database
    #-----------------------------------------------------------------------------
    db:
        image: postgres:16-alpine
        container_name: ai-interview-db

        restart: unless-stopped

        ports:
            - "5433:5432"

        environment:
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
            - POSTGRES_DB=${POSTGRES_DB:-ai_interview}
            - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
            # Performance tuning
            - POSTGRES_MAX_CONNECTIONS=100
            - POSTGRES_SHARED_BUFFERS=256MB

        volumes:
            - postgres_data:/var/lib/postgresql/data
            # Optional: Custom initialization scripts
            # - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro

        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_interview}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

        networks:
            - ai-interview-network

        # Resource limits
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 1G
                reservations:
                    cpus: "0.25"
                    memory: 256M

        # Logging configuration
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

        # Security: Run as non-root
        user: postgres

    #-----------------------------------------------------------------------------
    # Optional: PgAdmin for database management (dev/staging only)
    #-----------------------------------------------------------------------------
    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: ai-interview-pgadmin

        restart: unless-stopped

        ports:
            - "5050:80"

        environment:
            - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@example.com}
            - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
            - PGADMIN_CONFIG_SERVER_MODE=False
            - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False

        volumes:
            - pgadmin_data:/var/lib/pgadmin

        depends_on:
            - db

        networks:
            - ai-interview-network

        # Only run in development
        profiles:
            - dev

        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "2"

#===============================================================================
# Volumes
#===============================================================================
volumes:
    postgres_data:
        driver: local
        name: ai-interview-postgres-data

    pgadmin_data:
        driver: local
        name: ai-interview-pgadmin-data

#===============================================================================
# Networks
#===============================================================================
networks:
    ai-interview-network:
        driver: bridge
        name: ai-interview-network
